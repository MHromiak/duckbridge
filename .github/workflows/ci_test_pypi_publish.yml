# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: CI to Test PyPI from any non-develop branch

on:
  push:
    branches-ignore:
      - develop
jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python3 -m pip install --upgrade build twine coverage duckdb requests pandas

      - name: Run tests and generate coverage
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          coverage run --branch -m unittest discover -s ./tests -p "test*.py"
          coverage report
          coverage xml

      - name: Clean old builds
        run:
          rm -rf dist/*

      - name: Determine next dev version
        id: get_version
        run: |
          BASE_VERSION=$(grep version pyproject.toml | sed 's/.*"\(.*\)".*/\1/' | sed 's/-dev[0-9]*//')
          echo "Base version: $BASE_VERSION"

          PACKAGE_NAME="duckbridge"
          RESPONSE=$(curl -s https://test.pypi.org/pypi/${PACKAGE_NAME}/json || echo '{}')

          NEXT_DEV=1
          if echo "$RESPONSE" | jq -e '.releases' > /dev/null; then
            DEV_VERSIONS=$(echo "$RESPONSE" | jq -r '.releases | keys[]' | grep "${BASE_VERSION}-dev" || true)
            if [[ -n "$DEV_VERSIONS" ]]; then
              LAST_DEV=$(echo "$DEV_VERSIONS" | sed "s/${BASE_VERSION}-dev//" | sort -nr | head -n1)
              NEXT_DEV=$((LAST_DEV + 1))
            fi
          fi

          NEW_VERSION="${BASE_VERSION}-dev${NEXT_DEV}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update pyproject.toml with new version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.get_version.outputs.new_version }}\"/" pyproject.toml

      - name: Build distributable
        run:
          python3 -m build

      - name: Publish to PyPI

        run:
          python3 -m twine upload --verbose --repository testpypi dist/* -u __token__ -p ${{ secrets.TEST_PYPI_API_TOKEN }}